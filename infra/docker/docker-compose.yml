volumes:
  postgres_data:
  minio_data:

networks:
  dachjob-net:
    driver: bridge

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dachjob-postgres
    environment:
      POSTGRES_USER: dachjob
      POSTGRES_PASSWORD: dachjob
      POSTGRES_DB: dachjob
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dachjob -d dachjob"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dachjob-net

  redis:
    image: redis:7-alpine
    container_name: dachjob-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dachjob-net

  minio:
    image: minio/minio
    container_name: dachjob-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dachjob-net

  createbucket:
    image: minio/mc
    container_name: dachjob-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/dachjob-artifacts
      "
    networks:
      - dachjob-net

  api:
    build:
      context: ../../
      dockerfile: app/backend/Dockerfile
    container_name: dachjob-api
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+psycopg://dachjob:dachjob@postgres:5432/dachjob
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    volumes:
      - ../../app/backend:/app
    command: sh -c "alembic -c app/db/migrations/alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      createbucket:
        condition: service_completed_successfully
    networks:
      - dachjob-net

  worker:
    build:
      context: ../../
      dockerfile: app/backend/Dockerfile
    container_name: dachjob-worker
    env_file:
      - ../../.env
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+psycopg://dachjob:dachjob@postgres:5432/dachjob
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    command: celery -A app.workers.celery_app worker --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - dachjob-net

  frontend:
    build:
      context: ../../
      dockerfile: app/frontend/Dockerfile
    container_name: dachjob-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      INTERNAL_API_BASE_URL: http://api:8000
    volumes:
      - ../../app/frontend:/app
      - /app/node_modules
    depends_on:
      - api
    networks:
      - dachjob-net
