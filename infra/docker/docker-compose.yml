volumes:
  postgres_data:
  minio_data:

networks:
  dachjob-net:
    driver: bridge

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dachjob-postgres
    environment:
      POSTGRES_USER: dachjob
      POSTGRES_PASSWORD: dachjob
      POSTGRES_DB: dachjob
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dachjob -d dachjob"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dachjob-net

  redis:
    image: redis:7-alpine
    container_name: dachjob-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dachjob-net

  minio:
    image: minio/minio
    container_name: dachjob-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dachjob-net

  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    container_name: dachjob-api
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    volumes:
      - ../../apps/api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - dachjob-net

  worker:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    container_name: dachjob-worker
    env_file:
      - ../../.env
    command: celery -A app.workers.celery_app worker --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - dachjob-net

  frontend:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
    container_name: dachjob-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - api
    networks:
      - dachjob-net
