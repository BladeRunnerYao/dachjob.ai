apiVersion: v1
kind: Namespace
metadata:
  name: celery-worker
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: worker
  namespace: celery-worker
  annotations:
    iam.gke.io/gcp-service-account: dachjob-dev-worker-sa@dachjob-ai-platform.iam.gserviceaccount.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: celery-worker
  labels:
    app: dachjob
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dachjob
      component: worker
  template:
    metadata:
      labels:
        app: dachjob
        component: worker
    spec:
      serviceAccountName: worker
      volumes:
        - name: cloudsql
          emptyDir: {}
      containers:
        - name: worker
          image: europe-west1-docker.pkg.dev/dachjob-ai-platform/dachjob-dev-worker/worker:latest
          command: ["sh", "-c"]
          args:
            - exec celery -A app.workers.celery_app worker --loglevel=info --uid=app --gid=app 2>&1
          volumeMounts:
            - name: cloudsql
              mountPath: /cloudsql
          env:
            - name: APP_ENV
              value: "production"
            - name: CLOUD_SQL_CONNECTION_NAME
              value: dachjob-ai-platform:europe-west1:dachjob-dev-postgres
            - name: DATABASE_USER
              value: postgres
            - name: DATABASE_NAME
              value: dachjob
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: worker-secrets
                  key: database_password
            - name: REDIS_URL
              value: redis://10.36.0.3:6379/0
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: worker-secrets
                  key: database_url
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: worker-secrets
                  key: gemini_api_key
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: worker-secrets
                  key: jwt_secret_key
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: worker-secrets
                  key: jwt_secret_key
            - name: S3_ENDPOINT_URL
              value: https://storage.googleapis.com
            - name: S3_BUCKET_NAME
              value: dachjob-dev-artifacts
            - name: GOOGLE_CLOUD_PROJECT
              value: dachjob-ai-platform
            - name: LLM_PROVIDER
              value: gemini
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
          args:
            - "--private-ip"
            - "--unix-socket=/cloudsql"
            - "dachjob-ai-platform:europe-west1:dachjob-dev-postgres"
          volumeMounts:
            - name: cloudsql
              mountPath: /cloudsql
          securityContext:
            runAsNonRoot: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: celery-worker
  namespace: celery-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: celery-worker
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
