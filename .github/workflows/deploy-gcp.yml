name: Deploy to GCP

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        type: choice
        default: dev
        options:
          - dev
          - staging
          - prod
      branch:
        description: Optional branch override. Leave empty to deploy the selected workflow branch.
        required: false
        default: ""
      target:
        description: Deployment target
        required: true
        type: choice
        default: all
        options:
          - all
          - api
          - frontend
          - worker
          - terraform
      terraform_apply:
        description: Apply Terraform after plan
        required: false
        type: boolean
        default: false
      run_migrations:
        description: Run database migrations after API deploy
        required: false
        type: boolean
        default: true
      worker_mode:
        description: Worker mode for this deploy
        required: true
        type: choice
        default: disabled
        options:
          - disabled
          - enabled
      scale_down_worker_when_disabled:
        description: Scale existing GKE worker deployment to zero when worker mode is disabled
        required: false
        type: boolean
        default: true
      smoke_test_mode:
        description: Post-deploy smoke test depth
        required: false
        type: choice
        default: minimal
        options:
          - minimal
          - full

concurrency:
  group: deploy-gcp-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROJECT_ID: dachjob-ai-platform
  PROJECT_NUMBER: "936971254595"
  REGION: europe-west1
  GAR_LOCATION: europe-west1
  ENVIRONMENT: dev
  API_SERVICE_NAME: dachjob-dev-api
  FRONTEND_SERVICE_NAME: dachjob-dev-frontend
  MIGRATION_JOB_NAME: dachjob-dev-migrate
  API_BASE_URL: https://dachjob-dev-api-qxugiew36a-ew.a.run.app
  FRONTEND_URL: https://dachjob-dev-frontend-qxugiew36a-ew.a.run.app
  GKE_CLUSTER_NAME: dachjob-dev-cluster
  GKE_NAMESPACE: celery-worker
  WORKLOAD_IDENTITY_PROVIDER: projects/936971254595/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider
  DEPLOYER_SERVICE_ACCOUNT: dachjob-dev-terraform-sa@dachjob-ai-platform.iam.gserviceaccount.com
  API_SERVICE_ACCOUNT: dachjob-dev-api-sa@dachjob-ai-platform.iam.gserviceaccount.com
  FRONTEND_SERVICE_ACCOUNT: dachjob-dev-frontend-sa@dachjob-ai-platform.iam.gserviceaccount.com
  WORKER_SERVICE_ACCOUNT: dachjob-dev-worker-sa@dachjob-ai-platform.iam.gserviceaccount.com
  CLOUD_SQL_CONNECTION_NAME: dachjob-ai-platform:europe-west1:dachjob-dev-postgres
  VPC_CONNECTOR: projects/dachjob-ai-platform/locations/europe-west1/connectors/dachjob-dev-vpc-connector
  REDIS_HOST: 10.36.0.3
  REDIS_PORT: "6379"
  REDIS_URL: redis://10.36.0.3:6379/0
  REDIS_ENABLED: "true"
  GCS_BUCKET: dachjob-dev-artifacts
  GCP_TF_DIR: infra/terraform/live/gcp/dev

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: app/backend
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
    steps:
      - name: Resolve environment
        id: resolve
        working-directory: .
        run: |
          environment="${{ github.event.inputs.environment || 'dev' }}"
          echo "environment=${environment}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pre-commit
        run: pre-commit run --all-files

      - name: Run unit tests
        run: pytest tests/ --ignore=tests/test_provider_smoke.py -v

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Fetch GCP API keys and run provider smoke
        run: |
          set +x
          export GEMINI_API_KEY="$(gcloud secrets versions access latest --secret=dachjob-dev-gemini-api-key --project="${PROJECT_ID}")"
          export DEEPSEEK_API_KEY="$(gcloud secrets versions access latest --secret=dachjob-dev-deepseek-api-key --project="${PROJECT_ID}" 2>/dev/null || true)"
          export OPENROUTER_API_KEY="$(gcloud secrets versions access latest --secret=dachjob-dev-openrouter-api-key --project="${PROJECT_ID}" 2>/dev/null || true)"
          if ! pytest tests/test_provider_smoke.py -v; then
            echo "::warning::LLM provider smoke failed. Continuing deploy because provider quota/credits are external to the deployment pipeline."
          fi

  prepare:
    name: Prepare deployment
    needs: validate

    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      environment: ${{ steps.inputs.outputs.environment }}
      branch: ${{ steps.inputs.outputs.branch }}
      target: ${{ steps.inputs.outputs.target }}
      image_tag: ${{ steps.tag.outputs.image_tag }}
      commit_sha: ${{ steps.tag.outputs.commit_sha }}
      deploy_api: ${{ steps.inputs.outputs.deploy_api }}
      deploy_frontend: ${{ steps.inputs.outputs.deploy_frontend }}
      deploy_worker: ${{ steps.inputs.outputs.deploy_worker }}
      run_terraform: ${{ steps.inputs.outputs.run_terraform }}
      terraform_apply: ${{ steps.inputs.outputs.terraform_apply }}
      run_migrations: ${{ steps.inputs.outputs.run_migrations }}
      worker_enabled: ${{ steps.inputs.outputs.worker_enabled }}
      scale_down_worker: ${{ steps.inputs.outputs.scale_down_worker }}
    steps:
      - name: Resolve inputs
        id: inputs
        run: |
          environment="${{ needs.validate.outputs.environment || 'dev' }}"
          branch="${{ github.event.inputs.branch || github.ref_name }}"
          target="${{ github.event.inputs.target || 'all' }}"
          terraform_apply="${{ github.event.inputs.terraform_apply || 'false' }}"
          run_migrations="${{ github.event.inputs.run_migrations || 'true' }}"
          worker_mode="${{ github.event.inputs.worker_mode || 'disabled' }}"
          scale_down_worker="${{ github.event.inputs.scale_down_worker_when_disabled || 'true' }}"

          echo "environment=${environment}" >> "${GITHUB_OUTPUT}"
          echo "branch=${branch}" >> "${GITHUB_OUTPUT}"
          echo "target=${target}" >> "${GITHUB_OUTPUT}"
          echo "terraform_apply=${terraform_apply}" >> "${GITHUB_OUTPUT}"
          echo "run_migrations=${run_migrations}" >> "${GITHUB_OUTPUT}"
          echo "worker_enabled=${worker_mode}" >> "${GITHUB_OUTPUT}"
          echo "scale_down_worker=${scale_down_worker}" >> "${GITHUB_OUTPUT}"

          [[ "${target}" == "all" || "${target}" == "api" ]] && echo "deploy_api=true" >> "${GITHUB_OUTPUT}" || echo "deploy_api=false" >> "${GITHUB_OUTPUT}"
          [[ "${target}" == "all" || "${target}" == "frontend" ]] && echo "deploy_frontend=true" >> "${GITHUB_OUTPUT}" || echo "deploy_frontend=false" >> "${GITHUB_OUTPUT}"
          if [[ "${worker_mode}" == "disabled" && "${target}" == "worker" ]]; then
            echo "Error: target=worker requires worker_mode=enabled" >&2
            exit 1
          fi
          if [[ "${worker_mode}" == "enabled" && ("${target}" == "all" || "${target}" == "worker") ]]; then
            echo "deploy_worker=true" >> "${GITHUB_OUTPUT}"
          else
            echo "deploy_worker=false" >> "${GITHUB_OUTPUT}"
          fi
          [[ "${target}" == "all" || "${target}" == "terraform" ]] && echo "run_terraform=true" >> "${GITHUB_OUTPUT}" || echo "run_terraform=false" >> "${GITHUB_OUTPUT}"

      - name: Checkout selected branch
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.inputs.outputs.branch }}
          persist-credentials: false

      - name: Create image tag
        id: tag
        run: |
          commit_sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=12 HEAD)"
          echo "image_tag=${short_sha}-${GITHUB_RUN_NUMBER}" >> "${GITHUB_OUTPUT}"
          echo "commit_sha=${commit_sha}" >> "${GITHUB_OUTPUT}"

  terraform:
    name: Terraform (GCP)
    needs: prepare
    if: ${{ needs.prepare.outputs.run_terraform == 'true' }}
    runs-on: ubuntu-latest
    environment: ${{ needs.prepare.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    env:
      TF_VAR_project_id: dachjob-ai-platform
      TF_VAR_region: europe-west1
      TF_VAR_environment: ${{ needs.prepare.outputs.environment }}
      TF_VAR_billing_account_id: ${{ vars.GCP_BILLING_ACCOUNT_ID || secrets.GCP_BILLING_ACCOUNT_ID || '' }}
      TF_VAR_notification_email: ${{ vars.GCP_NOTIFICATION_EMAIL || vars.NOTIFICATION_EMAIL || secrets.GCP_NOTIFICATION_EMAIL || '' }}
      GCP_TF_BACKEND_BUCKET: ${{ vars.GCP_TF_BACKEND_BUCKET || 'dachjob-ai-terraform-state' }}
      GCP_TF_BACKEND_PREFIX: ${{ vars.GCP_TF_BACKEND_PREFIX || 'dev' }}
    outputs:
      api_url: ${{ steps.tf_outputs.outputs.api_url }}
      frontend_url: ${{ steps.tf_outputs.outputs.frontend_url }}
    steps:
      - name: Set TF_VAR_cors_origins from workflow env
        run: echo "TF_VAR_cors_origins=${FRONTEND_URL}" >> "$GITHUB_ENV"

      - name: Checkout selected branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.branch }}
          persist-credentials: false

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.10.0"

      - name: Terraform init
        working-directory: ${{ env.GCP_TF_DIR }}
        run: terraform init -backend-config="bucket=${GCP_TF_BACKEND_BUCKET}" -backend-config="prefix=${GCP_TF_BACKEND_PREFIX}"

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: ${{ env.GCP_TF_DIR }}
        run: terraform validate

      - name: Validate Terraform inputs
        run: |
          missing=()
          [[ -n "${TF_VAR_project_id}" ]] || missing+=("TF_VAR_project_id")
          [[ -n "${TF_VAR_billing_account_id}" ]] || missing+=("TF_VAR_billing_account_id")
          [[ -n "${TF_VAR_notification_email}" ]] || missing+=("TF_VAR_notification_email")
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required Terraform inputs: %s\n' "${missing[*]}" >&2
            printf 'Configure repository/environment variables or secrets before running Terraform.\n' >&2
            exit 1
          fi

      - name: Terraform plan
        working-directory: ${{ env.GCP_TF_DIR }}
        run: terraform plan -input=false -lock-timeout=300s -out=tfplan

      - name: Terraform apply
        if: ${{ needs.prepare.outputs.terraform_apply == 'true' }}
        working-directory: ${{ env.GCP_TF_DIR }}
        run: terraform apply -input=false -auto-approve tfplan

      - name: Capture Terraform outputs
        id: tf_outputs
        working-directory: ${{ env.GCP_TF_DIR }}
        run: |
          echo "api_url=$(terraform output -raw api_url 2>/dev/null || echo '')" >> "${GITHUB_OUTPUT}"
          echo "frontend_url=$(terraform output -raw frontend_url 2>/dev/null || echo '')" >> "${GITHUB_OUTPUT}"

  build-api:
    name: Build API image
    needs: prepare
    if: ${{ needs.prepare.outputs.deploy_api == 'true' }}
    runs-on: ubuntu-latest
    environment: ${{ needs.prepare.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.branch }}
          persist-credentials: false

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Login to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set image metadata
        id: meta
        run: |
          tag="${{ needs.prepare.outputs.image_tag }}"
          gcp_image="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dachjob-dev-api/api:${tag}"
          gcp_latest="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dachjob-dev-api/api:latest"
          echo "image=${gcp_image}" >> "${GITHUB_OUTPUT}"
          echo "latest=${gcp_latest}" >> "${GITHUB_OUTPUT}"
          {
            echo "tags<<EOF"
            echo "${gcp_image}"
            echo "${gcp_latest}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: app/backend/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            GIT_BRANCH=${{ needs.prepare.outputs.branch }}
            GIT_COMMIT_SHA=${{ needs.prepare.outputs.commit_sha }}
          tags: |
            ${{ steps.meta.outputs.tags }}

      - name: Clean old Artifact Registry images (keep last 3)
        if: success()
        run: |
          set +e
          repo="dachjob-dev-api"
          location="${{ env.GAR_LOCATION }}"
          project="${{ env.PROJECT_ID }}"

          gcloud artifacts docker images list \
            "${location}-docker.pkg.dev/${project}/${repo}" \
            --include-tags --format 'value(version)' --sort-by "~create_time" \
            --limit 100 | tail -n +4 | while read -r digest; do
            [[ -z "${digest}" ]] && continue
            gcloud artifacts docker images delete \
              "${location}-docker.pkg.dev/${project}/${repo}@${digest}" \
              --quiet --delete-tags 2>/dev/null || true
          done

  build-frontend:
    name: Build frontend image
    needs: prepare
    if: ${{ needs.prepare.outputs.deploy_frontend == 'true' }}
    runs-on: ubuntu-latest
    environment: ${{ needs.prepare.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.branch }}
          persist-credentials: false

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Login to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set image metadata
        id: meta
        run: |
          tag="${{ needs.prepare.outputs.image_tag }}"
          gcp_image="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dachjob-dev-frontend/frontend:${tag}"
          gcp_latest="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dachjob-dev-frontend/frontend:latest"
          echo "image=${gcp_image}" >> "${GITHUB_OUTPUT}"
          echo "latest=${gcp_latest}" >> "${GITHUB_OUTPUT}"
          {
            echo "tags<<EOF"
            echo "${gcp_image}"
            echo "${gcp_latest}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: app/frontend/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ env.API_BASE_URL }}
          tags: |
            ${{ steps.meta.outputs.tags }}

      - name: Clean old Artifact Registry images (keep last 3)
        if: success()
        run: |
          set +e
          repo="dachjob-dev-frontend"
          location="${{ env.GAR_LOCATION }}"
          project="${{ env.PROJECT_ID }}"

          gcloud artifacts docker images list \
            "${location}-docker.pkg.dev/${project}/${repo}" \
            --include-tags --format 'value(version)' --sort-by "~create_time" \
            --limit 100 | tail -n +4 | while read -r digest; do
            [[ -z "${digest}" ]] && continue
            gcloud artifacts docker images delete \
              "${location}-docker.pkg.dev/${project}/${repo}@${digest}" \
              --quiet --delete-tags 2>/dev/null || true
          done

  build-worker:
    name: Build worker image
    needs: prepare
    if: ${{ needs.prepare.outputs.deploy_worker == 'true' }}
    runs-on: ubuntu-latest
    environment: ${{ needs.prepare.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.branch }}
          persist-credentials: false

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Login to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set image metadata
        id: meta
        run: |
          tag="${{ needs.prepare.outputs.image_tag }}"
          gcp_image="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dachjob-dev-worker/worker:${tag}"
          gcp_latest="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dachjob-dev-worker/worker:latest"
          echo "image=${gcp_image}" >> "${GITHUB_OUTPUT}"
          echo "latest=${gcp_latest}" >> "${GITHUB_OUTPUT}"
          {
            echo "tags<<EOF"
            echo "${gcp_image}"
            echo "${gcp_latest}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push worker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: app/backend/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            GIT_BRANCH=${{ needs.prepare.outputs.branch }}
            GIT_COMMIT_SHA=${{ needs.prepare.outputs.commit_sha }}
          tags: |
            ${{ steps.meta.outputs.tags }}

      - name: Clean old Artifact Registry images (keep last 3)
        if: success()
        run: |
          set +e
          repo="dachjob-dev-worker"
          location="${{ env.GAR_LOCATION }}"
          project="${{ env.PROJECT_ID }}"

          gcloud artifacts docker images list \
            "${location}-docker.pkg.dev/${project}/${repo}" \
            --include-tags --format 'value(version)' --sort-by "~create_time" \
            --limit 100 | tail -n +4 | while read -r digest; do
            [[ -z "${digest}" ]] && continue
            gcloud artifacts docker images delete \
              "${location}-docker.pkg.dev/${project}/${repo}@${digest}" \
              --quiet --delete-tags 2>/dev/null || true
          done

  deploy-api:
    name: Deploy API (GCP)
    needs:
      - prepare
      - terraform
      - build-api
    if: ${{ always() && needs.prepare.outputs.deploy_api == 'true' && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') && needs.build-api.result == 'success' }}
    runs-on: ubuntu-latest
    environment: ${{ needs.prepare.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    outputs:
      url: ${{ steps.url.outputs.url }}
    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.branch }}
          persist-credentials: false

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy "${API_SERVICE_NAME}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${{ needs.build-api.outputs.image }}" \
            --service-account="${API_SERVICE_ACCOUNT}" \
            --port=8000 \
            --allow-unauthenticated \
            --add-cloudsql-instances="${CLOUD_SQL_CONNECTION_NAME}" \
            --vpc-connector="${VPC_CONNECTOR}" \
            --vpc-egress=private-ranges-only \
            --set-env-vars="APP_ENV=production,CLOUD_SQL_CONNECTION_NAME=${CLOUD_SQL_CONNECTION_NAME},DATABASE_USER=postgres,DATABASE_NAME=dachjob,REDIS_URL=${REDIS_URL},REDIS_HOST=${REDIS_HOST},REDIS_PORT=${REDIS_PORT},REDIS_ENABLED=${REDIS_ENABLED},S3_ENDPOINT_URL=https://storage.googleapis.com,S3_BUCKET_NAME=${GCS_BUCKET},STORAGE_BUCKET_NAME=${GCS_BUCKET},GOOGLE_CLOUD_PROJECT=${PROJECT_ID},LLM_PROVIDER=vertex_ai,VERTEX_AI_PROJECT_ID=${PROJECT_ID},VERTEX_AI_LOCATION=global,CORS_ORIGINS=${FRONTEND_URL},WORKER_ENABLED=${{ needs.prepare.outputs.worker_enabled == 'enabled' && 'true' || 'false' }},WORKER_FALLBACK_TO_SYNC=true,LOG_LEVEL=INFO,LOG_JSON=true,ERROR_LOG_TO_FILE=true,ERROR_LOG_DIR=/tmp/dachjob-error-logs,STORAGE_PROVIDER=gcs" \
            --update-secrets="DATABASE_PASSWORD=dachjob-dev-db-password:latest,JWT_SECRET=dachjob-dev-jwt-secret-key:latest,SECRET_KEY=dachjob-dev-jwt-secret-key:latest,GEMINI_API_KEY=dachjob-dev-gemini-api-key:latest,RESEND_API_KEY=dachjob-dev-smtp-password:latest,S3_ACCESS_KEY_ID=dachjob-dev-s3-access-key:latest,S3_SECRET_ACCESS_KEY=dachjob-dev-s3-secret-key:latest"

      - name: Deploy migration job
        if: ${{ needs.prepare.outputs.run_migrations == 'true' }}
        run: |
          gcloud run jobs deploy "${MIGRATION_JOB_NAME}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${{ needs.build-api.outputs.image }}" \
            --service-account="${API_SERVICE_ACCOUNT}" \
            --set-cloudsql-instances="${CLOUD_SQL_CONNECTION_NAME}" \
            --vpc-connector="${VPC_CONNECTOR}" \
            --vpc-egress=private-ranges-only \
            --command=alembic \
            --args=-c,app/db/migrations/alembic.ini,upgrade,head \
            --set-env-vars="APP_ENV=production,CLOUD_SQL_CONNECTION_NAME=${CLOUD_SQL_CONNECTION_NAME},DATABASE_USER=postgres,DATABASE_NAME=dachjob,REDIS_URL=${REDIS_URL},REDIS_ENABLED=${REDIS_ENABLED},S3_ENDPOINT_URL=https://storage.googleapis.com,S3_BUCKET_NAME=${GCS_BUCKET},STORAGE_BUCKET_NAME=${GCS_BUCKET},GOOGLE_CLOUD_PROJECT=${PROJECT_ID},LLM_PROVIDER=deepseek,STORAGE_PROVIDER=gcs" \
            --update-secrets="DATABASE_PASSWORD=dachjob-dev-db-password:latest,JWT_SECRET=dachjob-dev-jwt-secret-key:latest,SECRET_KEY=dachjob-dev-jwt-secret-key:latest,OPENROUTER_API_KEY=dachjob-dev-openrouter-api-key:latest,DEEPSEEK_API_KEY=dachjob-dev-deepseek-api-key:latest"

      - name: Run migration job
        if: ${{ needs.prepare.outputs.run_migrations == 'true' }}
        run: |
          gcloud run jobs execute "${MIGRATION_JOB_NAME}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --wait

      - name: Capture service URL
        id: url
        run: |
          url="$(gcloud run services describe "${API_SERVICE_NAME}" --project="${PROJECT_ID}" --region="${REGION}" --format='value(status.url)')"
          echo "url=${url}" >> "${GITHUB_OUTPUT}"

      - name: Health check API
        run: |
          for attempt in {1..30}; do
            if curl -fsS "${{ steps.url.outputs.url }}/api/health"; then
              exit 0
            fi
            sleep 5
          done
          exit 1

  deploy-frontend:
    name: Deploy frontend (GCP)
    needs:
      - prepare
      - terraform
      - build-frontend
    if: ${{ always() && needs.prepare.outputs.deploy_frontend == 'true' && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') && needs.build-frontend.result == 'success' }}
    runs-on: ubuntu-latest
    environment: ${{ needs.prepare.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    outputs:
      url: ${{ steps.url.outputs.url }}
    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.branch }}
          persist-credentials: false

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy "${FRONTEND_SERVICE_NAME}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${{ needs.build-frontend.outputs.image }}" \
            --service-account="${FRONTEND_SERVICE_ACCOUNT}" \
            --port=3000 \
            --allow-unauthenticated \
            --set-env-vars="NODE_ENV=production,NEXT_PUBLIC_API_BASE_URL=${API_BASE_URL},INTERNAL_API_BASE_URL=${API_BASE_URL}"

      - name: Capture service URL
        id: url
        run: |
          url="$(gcloud run services describe "${FRONTEND_SERVICE_NAME}" --project="${PROJECT_ID}" --region="${REGION}" --format='value(status.url)')"
          echo "url=${url}" >> "${GITHUB_OUTPUT}"

      - name: Health check frontend
        run: |
          for attempt in {1..30}; do
            if curl -fsS "${{ steps.url.outputs.url }}" >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          exit 1

  deploy-worker:
    name: Deploy worker (GCP)
    needs:
      - prepare
      - terraform
      - build-worker
    if: ${{ always() && needs.prepare.outputs.deploy_worker == 'true' && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') && needs.build-worker.result == 'success' }}
    runs-on: ubuntu-latest
    environment: ${{ needs.prepare.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.branch }}
          persist-credentials: false

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy worker to GKE
        run: |
          gcloud iam service-accounts add-iam-policy-binding "${WORKER_SERVICE_ACCOUNT}" \
            --project="${PROJECT_ID}" \
            --role="roles/iam.workloadIdentityUser" \
            --member="serviceAccount:${PROJECT_ID}.svc.id.goog[${GKE_NAMESPACE}/worker]" >/dev/null

          set +x
          database_password="$(gcloud secrets versions access latest --secret=dachjob-dev-db-password --project="${PROJECT_ID}")"
          jwt_secret_key="$(gcloud secrets versions access latest --secret=dachjob-dev-jwt-secret-key --project="${PROJECT_ID}")"
          gemini_api_key="$(gcloud secrets versions access latest --secret=dachjob-dev-gemini-api-key --project="${PROJECT_ID}" 2>/dev/null || true)"
          database_url="postgresql+psycopg://postgres:${database_password}@localhost/dachjob?host=/cloudsql/${CLOUD_SQL_CONNECTION_NAME}"

          kubectl create namespace "${GKE_NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic worker-secrets \
            --namespace="${GKE_NAMESPACE}" \
            --from-literal=database_password="${database_password}" \
            --from-literal=database_url="${database_url}" \
            --from-literal=jwt_secret_key="${jwt_secret_key}" \
            --from-literal=gemini_api_key="${gemini_api_key}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl apply -f infra/k8s/celery-worker/deployment.yaml
          kubectl set image deployment/celery-worker \
            worker="${{ needs.build-worker.outputs.image }}" \
            --namespace="${GKE_NAMESPACE}"
          kubectl rollout status deployment/celery-worker --namespace="${GKE_NAMESPACE}" --timeout=300s
          kubectl get pods --namespace="${GKE_NAMESPACE}" -o wide

  smoke-test:
    name: Smoke test
    needs:
      - prepare
      - deploy-api
      - deploy-frontend
    if: ${{ always() && needs.deploy-api.result == 'success' && needs.deploy-frontend.result == 'success' }}
    runs-on: ubuntu-latest
    environment: ${{ needs.prepare.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Fetch test credentials from GCP Secret Manager
        run: |
          SMOKE_TEST_PASSWORD="$(gcloud secrets versions access latest --secret=dachjob-dev-test-ci-password --project="${PROJECT_ID}" 2>/dev/null || echo '')"
          echo "SMOKE_TEST_PASSWORD=${SMOKE_TEST_PASSWORD}" >> "${GITHUB_ENV}"

      - name: Run smoke test
        run: |
          SMOKE_TEST_MODE="${{ github.event.inputs.smoke_test_mode || 'full' }}" \
          API_BASE_URL="${{ needs.deploy-api.outputs.url || env.API_BASE_URL }}" \
          FRONTEND_URL="${{ needs.deploy-frontend.outputs.url || env.FRONTEND_URL }}" \
          SMOKE_TEST_EMAIL="smoke+gcp-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}@example.com" \
          bash infra/deploy/scripts/smoke-test-api.sh

  summary:
    name: Deployment summary
    needs:
      - prepare
      - terraform
      - deploy-api
      - deploy-frontend
      - deploy-worker
      - smoke-test
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Write summary
        run: |
          echo "## GCP Deployment Summary" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Item | Value |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| --- | --- |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Environment | ${{ needs.prepare.outputs.environment || 'dev' }} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Branch | ${{ needs.prepare.outputs.branch }} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Target | ${{ needs.prepare.outputs.target }} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Image tag | ${{ needs.prepare.outputs.image_tag }} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Terraform | ${{ needs.terraform.result }} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| API | ${{ needs.deploy-api.result }} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Frontend | ${{ needs.deploy-frontend.result }} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Worker | ${{ needs.deploy-worker.result || 'skipped' }} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Smoke test | ${{ needs.smoke-test.result }} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| API URL | ${{ needs.deploy-api.outputs.url || env.API_BASE_URL }} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Frontend URL | ${{ needs.deploy-frontend.outputs.url || env.FRONTEND_URL }} |" >> "${GITHUB_STEP_SUMMARY}"
