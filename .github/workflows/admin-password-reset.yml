name: Admin password reset

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        default: dev
        options:
          - dev
          - staging
          - prod
      email:
        description: Account email address
        required: true
        type: string
      api_url:
        description: Optional API base URL. Defaults to ADMIN_API_URL or AWS_API_URL from the protected admin environment.
        required: false
        type: string
        default: ""

concurrency:
  group: admin-password-reset-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  request-reset:
    name: Request password reset
    runs-on: ubuntu-latest
    environment: admin
    steps:
      - name: Request reset email
        env:
          INPUT_API_URL: ${{ github.event.inputs.api_url }}
          DEFAULT_API_URL: ${{ vars.ADMIN_API_URL || vars.AWS_API_URL || '' }}
          EMAIL: ${{ github.event.inputs.email }}
        run: |
          api_url="${INPUT_API_URL:-${DEFAULT_API_URL}}"
          if [[ -z "${api_url}" ]]; then
            echo "::error::Set the api_url input, ADMIN_API_URL, or AWS_API_URL in the protected admin environment."
            exit 1
          fi
          api_url="${api_url%/}"

          payload="$(jq -nc --arg email "${EMAIL}" '{email: $email}')"
          response_file="$(mktemp)"
          http_code="$(curl -sS -o "${response_file}" -w "%{http_code}" \
            -X POST "${api_url}/api/auth/forgot-password" \
            -H "Content-Type: application/json" \
            --data "${payload}")"

          if [[ "${http_code}" -lt 200 || "${http_code}" -ge 300 ]]; then
            echo "::error::Password reset request failed with HTTP ${http_code}."
            rm -f "${response_file}"
            exit 1
          fi

          reset_link="$(python3 - "${response_file}" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as fh:
              data = json.load(fh)

          print(data.get("reset_link", ""))
          PY
          )"
          if [[ -n "${reset_link}" ]]; then
            echo "::add-mask::${reset_link}"
          fi

          rm -f "${response_file}"
          echo "::notice::Password reset flow requested for ${EMAIL}."
