name: Deploy

on:
  push:
    branches:
      - main
      - deploy/*
  workflow_dispatch:
    inputs:
      cloud:
        description: Target cloud provider
        required: true
        type: choice
        default: gcp
        options:
          - gcp
          - azure
          - all
      environment:
        description: Deployment environment
        required: true
        type: choice
        default: dev
        options:
          - dev
          - staging
          - prod
      branch:
        description: Optional branch override. Leave empty to deploy the selected workflow branch.
        required: false
        default: ""
      target:
        description: Deployment target
        required: true
        type: choice
        default: all
        options:
          - all
          - api
          - frontend
          - worker
          - terraform
      terraform_apply:
        description: Apply Terraform after plan
        required: false
        type: boolean
        default: false
      run_migrations:
        description: Run database migrations after API deploy
        required: false
        type: boolean
        default: true
      worker_mode:
        description: Worker mode for this deploy
        required: true
        type: choice
        default: disabled
        options:
          - disabled
          - enabled
      scale_down_worker_when_disabled:
        description: Scale existing GKE worker deployment to zero when worker mode is disabled
        required: false
        type: boolean
        default: true

concurrency:
  group: deploy-${{ github.event.inputs.cloud || 'gcp' }}-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROJECT_ID: dachjob-ai-platform
  PROJECT_NUMBER: "936971254595"
  REGION: europe-west1
  GAR_LOCATION: europe-west1
  ENVIRONMENT: dev
  API_SERVICE_NAME: dachjob-dev-api
  FRONTEND_SERVICE_NAME: dachjob-dev-frontend
  MIGRATION_JOB_NAME: dachjob-dev-migrate
  API_BASE_URL: https://dachjob-dev-api-qxugiew36a-ew.a.run.app
  FRONTEND_URL: https://dachjob-dev-frontend-qxugiew36a-ew.a.run.app
  GKE_CLUSTER_NAME: dachjob-dev-cluster
  GKE_NAMESPACE: celery-worker
  WORKLOAD_IDENTITY_PROVIDER: projects/936971254595/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider
  DEPLOYER_SERVICE_ACCOUNT: dachjob-dev-terraform-sa@dachjob-ai-platform.iam.gserviceaccount.com
  API_SERVICE_ACCOUNT: dachjob-dev-api-sa@dachjob-ai-platform.iam.gserviceaccount.com
  FRONTEND_SERVICE_ACCOUNT: dachjob-dev-frontend-sa@dachjob-ai-platform.iam.gserviceaccount.com
  WORKER_SERVICE_ACCOUNT: dachjob-dev-worker-sa@dachjob-ai-platform.iam.gserviceaccount.com
  CLOUD_SQL_CONNECTION_NAME: dachjob-ai-platform:europe-west1:dachjob-dev-postgres
  VPC_CONNECTOR: projects/dachjob-ai-platform/locations/europe-west1/connectors/dachjob-dev-vpc-connector
  REDIS_HOST: 10.36.0.3
  REDIS_PORT: "6379"
  REDIS_URL: redis://10.36.0.3:6379/0
  REDIS_ENABLED: "true"
  GCS_BUCKET: dachjob-dev-artifacts
  # Azure defaults (overridden by GitHub Variables for cloud=azure)
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || '' }}
  AZURE_CONTAINER_APP_ENV: ${{ vars.AZURE_CONTAINER_APP_ENV || '' }}
  AZURE_API_NAME: ${{ vars.AZURE_API_NAME || '' }}
  AZURE_FRONTEND_NAME: ${{ vars.AZURE_FRONTEND_NAME || '' }}
  AZURE_WORKER_NAME: ${{ vars.AZURE_WORKER_NAME || '' }}
  AZURE_MIGRATION_JOB_NAME: ${{ vars.AZURE_MIGRATION_JOB_NAME || '' }}
  AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME || '' }}
  AZURE_TF_DIR: infra/terraform/live/azure/dev
  GCP_TF_DIR: infra/terraform

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: app/backend
    outputs:
      cloud: ${{ steps.resolve.outputs.cloud }}
      environment: ${{ steps.resolve.outputs.environment }}
    steps:
      - name: Resolve cloud and environment
        id: resolve
        working-directory: .
        run: |
          cloud="${{ github.event.inputs.cloud || 'gcp' }}"
          environment="${{ github.event.inputs.environment || 'dev' }}"
          echo "cloud=${cloud}" >> "${GITHUB_OUTPUT}"
          echo "environment=${environment}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pre-commit
        run: pre-commit run --all-files

      - name: Run unit tests
        run: pytest tests/ --ignore=tests/test_provider_smoke.py -v

      - name: Authenticate to Google Cloud
        if: ${{ steps.resolve.outputs.cloud == 'gcp' || steps.resolve.outputs.cloud == 'all' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Fetch GCP API keys and run provider smoke
        if: ${{ steps.resolve.outputs.cloud == 'gcp' || steps.resolve.outputs.cloud == 'all' }}
        run: |
          set +x
          export GEMINI_API_KEY="$(gcloud secrets versions access latest --secret=dachjob-dev-gemini-api-key --project="${PROJECT_ID}")"
          export DEEPSEEK_API_KEY="$(gcloud secrets versions access latest --secret=dachjob-dev-deepseek-api-key --project="${PROJECT_ID}" 2>/dev/null || true)"
          export OPENROUTER_API_KEY="$(gcloud secrets versions access latest --secret=dachjob-dev-openrouter-api-key --project="${PROJECT_ID}" 2>/dev/null || true)"
          pytest tests/test_provider_smoke.py -v

  prepare:
    name: Prepare deployment
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      cloud: ${{ steps.inputs.outputs.cloud }}
      environment: ${{ steps.inputs.outputs.environment }}
      branch: ${{ steps.inputs.outputs.branch }}
      target: ${{ steps.inputs.outputs.target }}
      image_tag: ${{ steps.tag.outputs.image_tag }}
      commit_sha: ${{ steps.tag.outputs.commit_sha }}
      deploy_api: ${{ steps.inputs.outputs.deploy_api }}
      deploy_frontend: ${{ steps.inputs.outputs.deploy_frontend }}
      deploy_worker: ${{ steps.inputs.outputs.deploy_worker }}
      run_terraform: ${{ steps.inputs.outputs.run_terraform }}
      terraform_apply: ${{ steps.inputs.outputs.terraform_apply }}
      run_migrations: ${{ steps.inputs.outputs.run_migrations }}
      worker_enabled: ${{ steps.inputs.outputs.worker_enabled }}
      scale_down_worker: ${{ steps.inputs.outputs.scale_down_worker }}
    steps:
      - name: Resolve inputs
        id: inputs
        run: |
          cloud="${{ needs.validate.outputs.cloud || 'gcp' }}"
          environment="${{ needs.validate.outputs.environment || 'dev' }}"
          branch="${{ github.event.inputs.branch }}"
          if [[ -z "${branch}" ]]; then
            branch="${GITHUB_REF_NAME}"
          fi
          target="${{ github.event.inputs.target || 'all' }}"
          terraform_apply="${{ github.event.inputs.terraform_apply || 'false' }}"
          run_migrations="${{ github.event.inputs.run_migrations || 'true' }}"
          worker_mode="${{ github.event.inputs.worker_mode || 'disabled' }}"
          scale_down_worker="${{ github.event.inputs.scale_down_worker_when_disabled || 'true' }}"

          echo "cloud=${cloud}" >> "${GITHUB_OUTPUT}"
          echo "environment=${environment}" >> "${GITHUB_OUTPUT}"
          echo "branch=${branch}" >> "${GITHUB_OUTPUT}"
          echo "target=${target}" >> "${GITHUB_OUTPUT}"
          echo "terraform_apply=${terraform_apply}" >> "${GITHUB_OUTPUT}"
          echo "run_migrations=${run_migrations}" >> "${GITHUB_OUTPUT}"
          echo "worker_enabled=${worker_mode}" >> "${GITHUB_OUTPUT}"
          echo "scale_down_worker=${scale_down_worker}" >> "${GITHUB_OUTPUT}"

          [[ "${target}" == "all" || "${target}" == "api" ]] && echo "deploy_api=true" >> "${GITHUB_OUTPUT}" || echo "deploy_api=false" >> "${GITHUB_OUTPUT}"
          [[ "${target}" == "all" || "${target}" == "frontend" ]] && echo "deploy_frontend=true" >> "${GITHUB_OUTPUT}" || echo "deploy_frontend=false" >> "${GITHUB_OUTPUT}"
          if [[ "${worker_mode}" == "disabled" && "${target}" == "worker" ]]; then
            echo "Error: target=worker requires worker_mode=enabled" >&2
            exit 1
          fi
          if [[ "${worker_mode}" == "enabled" && ("${target}" == "all" || "${target}" == "worker") ]]; then
            echo "deploy_worker=true" >> "${GITHUB_OUTPUT}"
          else
            echo "deploy_worker=false" >> "${GITHUB_OUTPUT}"
          fi
          [[ "${target}" == "all" || "${target}" == "terraform" ]] && echo "run_terraform=true" >> "${GITHUB_OUTPUT}" || echo "run_terraform=false" >> "${GITHUB_OUTPUT}"

      - name: Checkout selected branch
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.inputs.outputs.branch }}

      - name: Create image tag
        id: tag
        run: |
          commit_sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=12 HEAD)"
          echo "image_tag=${short_sha}-${GITHUB_RUN_NUMBER}" >> "${GITHUB_OUTPUT}"
          echo "commit_sha=${commit_sha}" >> "${GITHUB_OUTPUT}"

  terraform:
    name: Terraform (${{ needs.prepare.outputs.cloud }})
    needs: prepare
    if: ${{ needs.prepare.outputs.run_terraform == 'true' }}
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write
    outputs:
      api_url: ${{ steps.tf_outputs.outputs.api_url }}
      frontend_url: ${{ steps.tf_outputs.outputs.frontend_url }}
    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.branch }}

      - name: Authenticate to Google Cloud
        if: ${{ needs.prepare.outputs.cloud == 'gcp' || needs.prepare.outputs.cloud == 'all' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Authenticate to Azure
        if: ${{ needs.prepare.outputs.cloud == 'azure' || needs.prepare.outputs.cloud == 'all' }}
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.10.0"

      - name: Terraform init (GCP)
        if: ${{ needs.prepare.outputs.cloud == 'gcp' || needs.prepare.outputs.cloud == 'all' }}
        working-directory: ${{ env.GCP_TF_DIR }}
        run: terraform init -backend-config=environments/${{ needs.prepare.outputs.environment }}/backend.conf

      - name: Terraform init (GCP)
        if: ${{ needs.prepare.outputs.cloud == 'gcp' || needs.prepare.outputs.cloud == 'all' }}
        working-directory: ${{ env.GCP_TF_DIR }}
        run: terraform init -backend-config=environments/${{ needs.prepare.outputs.environment }}/backend.conf

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform validate (GCP)
        if: ${{ needs.prepare.outputs.cloud == 'gcp' || needs.prepare.outputs.cloud == 'all' }}
        working-directory: ${{ env.GCP_TF_DIR }}
        run: terraform validate

      - name: Terraform plan (GCP)
        if: ${{ needs.prepare.outputs.cloud == 'gcp' || needs.prepare.outputs.cloud == 'all' }}
        working-directory: ${{ env.GCP_TF_DIR }}
        run: terraform plan -var-file=environments/${{ needs.prepare.outputs.environment }}/terraform.tfvars -out=tfplan

      - name: Terraform apply (GCP)
        if: ${{ (needs.prepare.outputs.terraform_apply == 'true' || needs.prepare.outputs.target == 'terraform') && (needs.prepare.outputs.cloud == 'gcp' || needs.prepare.outputs.cloud == 'all') }}
        working-directory: ${{ env.GCP_TF_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Capture Terraform outputs
        id: tf_outputs
        run: |
          if [[ "${{ needs.prepare.outputs.cloud }}" == "gcp" ]]; then
            cd "${{ env.GCP_TF_DIR }}"
            echo "api_url=$(terraform output -raw api_url 2>/dev/null || echo '')" >> "${GITHUB_OUTPUT}"
            echo "frontend_url=$(terraform output -raw frontend_url 2>/dev/null || echo '')" >> "${GITHUB_OUTPUT}"
          fi

  build-api:
    name: Build API image (${{ needs.prepare.outputs.cloud }})
    needs: prepare
    if: ${{ needs.prepare.outputs.deploy_api == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.branch }}

      - name: Authenticate to Google Cloud
        if: ${{ needs.prepare.outputs.cloud == 'gcp' || needs.prepare.outputs.cloud == 'all' }}
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Login to Artifact Registry (GCP)
        if: ${{ needs.prepare.outputs.cloud == 'gcp' || needs.prepare.outputs.cloud == 'all' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Authenticate to Azure
        if: ${{ needs.prepare.outputs.cloud == 'azure' || needs.prepare.outputs.cloud == 'all' }}
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR (Azure)
        if: ${{ needs.prepare.outputs.cloud == 'azure' || needs.prepare.outputs.cloud == 'all' }}
        run: az acr login --name "${{ env.AZURE_ACR_NAME }}"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set image metadata
        id: meta
        run: |
          tag="${{ needs.prepare.outputs.image_tag }}"
          cloud="${{ needs.prepare.outputs.cloud }}"
          if [[ "${cloud}" == "gcp" ]]; then
            image="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dachjob-dev-api/api:${tag}"
            latest="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dachjob-dev-api/api:latest"
          elif [[ "${cloud}" == "azure" ]]; then
            image="${{ env.AZURE_ACR_NAME }}.azurecr.io/api:${tag}"
            latest="${{ env.AZURE_ACR_NAME }}.azurecr.io/api:latest"
          else
            image="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dachjob-dev-api/api:${tag}"
            latest="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dachjob-dev-api/api:latest"
          fi
          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          echo "latest=${latest}" >> "${GITHUB_OUTPUT}"

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: app/backend/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            GIT_BRANCH=${{ needs.prepare.outputs.branch }}
            GIT_COMMIT_SHA=${{ needs.prepare.outputs.commit_sha }}
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.latest }}

  build-frontend:
    name: Build frontend image (${{ needs.prepare.outputs.cloud }})
    needs: prepare
    if: ${{ needs.prepare.outputs.deploy_frontend == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.branch }}

      - name: Authenticate to Google Cloud
        if: ${{ needs.prepare.outputs.cloud == 'gcp' || needs.prepare.outputs.cloud == 'all' }}
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Login to Artifact Registry (GCP)
        if: ${{ needs.prepare.outputs.cloud == 'gcp' || needs.prepare.outputs.cloud == 'all' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Authenticate to Azure
        if: ${{ needs.prepare.outputs.cloud == 'azure' || needs.prepare.outputs.cloud == 'all' }}
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR (Azure)
        if: ${{ needs.prepare.outputs.cloud == 'azure' || needs.prepare.outputs.cloud == 'all' }}
        run: az acr login --name "${{ env.AZURE_ACR_NAME }}"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set image metadata
        id: meta
        run: |
          tag="${{ needs.prepare.outputs.image_tag }}"
          cloud="${{ needs.prepare.outputs.cloud }}"
          if [[ "${cloud}" == "gcp" || "${cloud}" == "all" ]]; then
            image="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dachjob-dev-frontend/frontend:${tag}"
            latest="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dachjob-dev-frontend/frontend:latest"
          else
            image="${{ env.AZURE_ACR_NAME }}.azurecr.io/frontend:${tag}"
            latest="${{ env.AZURE_ACR_NAME }}.azurecr.io/frontend:latest"
          fi
          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          echo "latest=${latest}" >> "${GITHUB_OUTPUT}"

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: app/frontend/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ env.API_BASE_URL }}
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.latest }}

  build-worker:
    name: Build worker image (${{ needs.prepare.outputs.cloud }})
    needs: prepare
    if: ${{ needs.prepare.outputs.deploy_worker == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.branch }}

      - name: Authenticate to Google Cloud
        if: ${{ needs.prepare.outputs.cloud == 'gcp' || needs.prepare.outputs.cloud == 'all' }}
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Login to Artifact Registry (GCP)
        if: ${{ needs.prepare.outputs.cloud == 'gcp' || needs.prepare.outputs.cloud == 'all' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Authenticate to Azure
        if: ${{ needs.prepare.outputs.cloud == 'azure' || needs.prepare.outputs.cloud == 'all' }}
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR (Azure)
        if: ${{ needs.prepare.outputs.cloud == 'azure' || needs.prepare.outputs.cloud == 'all' }}
        run: az acr login --name "${{ env.AZURE_ACR_NAME }}"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set image metadata
        id: meta
        run: |
          tag="${{ needs.prepare.outputs.image_tag }}"
          cloud="${{ needs.prepare.outputs.cloud }}"
          if [[ "${cloud}" == "gcp" || "${cloud}" == "all" ]]; then
            image="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dachjob-dev-worker/worker:${tag}"
            latest="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dachjob-dev-worker/worker:latest"
          else
            image="${{ env.AZURE_ACR_NAME }}.azurecr.io/worker:${tag}"
            latest="${{ env.AZURE_ACR_NAME }}.azurecr.io/worker:latest"
          fi
          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          echo "latest=${latest}" >> "${GITHUB_OUTPUT}"

      - name: Build and push worker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: app/backend/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            GIT_BRANCH=${{ needs.prepare.outputs.branch }}
            GIT_COMMIT_SHA=${{ needs.prepare.outputs.commit_sha }}
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.latest }}

  deploy-api:
    name: Deploy API (${{ needs.prepare.outputs.cloud }})
    needs:
      - prepare
      - terraform
      - build-api
    if: ${{ always() && needs.prepare.outputs.deploy_api == 'true' && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') && needs.build-api.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      url: ${{ steps.url.outputs.url }}
    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.branch }}

      - name: Authenticate to Google Cloud
        if: ${{ needs.prepare.outputs.cloud == 'gcp' || needs.prepare.outputs.cloud == 'all' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Setup gcloud (GCP)
        if: ${{ needs.prepare.outputs.cloud == 'gcp' || needs.prepare.outputs.cloud == 'all' }}
        uses: google-github-actions/setup-gcloud@v3

      - name: Authenticate to Azure
        if: ${{ needs.prepare.outputs.cloud == 'azure' || needs.prepare.outputs.cloud == 'all' }}
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy API (GCP)
        if: ${{ needs.prepare.outputs.cloud == 'gcp' || needs.prepare.outputs.cloud == 'all' }}
        run: |
          gcloud run deploy "${API_SERVICE_NAME}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${{ needs.build-api.outputs.image }}" \
            --service-account="${API_SERVICE_ACCOUNT}" \
            --port=8000 \
            --allow-unauthenticated \
            --add-cloudsql-instances="${CLOUD_SQL_CONNECTION_NAME}" \
            --vpc-connector="${VPC_CONNECTOR}" \
            --vpc-egress=private-ranges-only \
            --set-env-vars="APP_ENV=production,CLOUD_SQL_CONNECTION_NAME=${CLOUD_SQL_CONNECTION_NAME},DATABASE_USER=postgres,DATABASE_NAME=dachjob,REDIS_URL=${REDIS_URL},REDIS_HOST=${REDIS_HOST},REDIS_PORT=${REDIS_PORT},REDIS_ENABLED=${REDIS_ENABLED},S3_ENDPOINT_URL=https://storage.googleapis.com,S3_BUCKET_NAME=${GCS_BUCKET},GOOGLE_CLOUD_PROJECT=${PROJECT_ID},LLM_PROVIDER=vertex_ai,VERTEX_AI_PROJECT_ID=${PROJECT_ID},VERTEX_AI_LOCATION=global,CORS_ORIGINS=${FRONTEND_URL},WORKER_ENABLED=${{ needs.prepare.outputs.worker_enabled == 'enabled' && 'true' || 'false' }},WORKER_FALLBACK_TO_SYNC=true,LOG_LEVEL=INFO,LOG_JSON=true,ERROR_LOG_TO_FILE=true,ERROR_LOG_DIR=/tmp/dachjob-error-logs" \
            --update-secrets="DATABASE_PASSWORD=dachjob-dev-db-password:latest,JWT_SECRET=dachjob-dev-jwt-secret-key:latest,SECRET_KEY=dachjob-dev-jwt-secret-key:latest,GEMINI_API_KEY=dachjob-dev-gemini-api-key:latest,RESEND_API_KEY=dachjob-dev-smtp-password:latest,S3_ACCESS_KEY_ID=dachjob-dev-s3-access-key:latest,S3_SECRET_ACCESS_KEY=dachjob-dev-s3-secret-key:latest"

      - name: Deploy API (Azure)
        if: ${{ needs.prepare.outputs.cloud == 'azure' || needs.prepare.outputs.cloud == 'all' }}
        run: |
          bash infra/deploy/scripts/deploy-azure.sh "api" \
            "${{ needs.build-api.outputs.image }}" "" "" "" "${{ needs.prepare.outputs.run_migrations }}"

      - name: Deploy migration job
        if: ${{ (needs.prepare.outputs.cloud == 'gcp' || needs.prepare.outputs.cloud == 'all') && needs.prepare.outputs.run_migrations == 'true' }}
        run: |
          gcloud run jobs deploy "${MIGRATION_JOB_NAME}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${{ needs.build-api.outputs.image }}" \
            --service-account="${API_SERVICE_ACCOUNT}" \
            --set-cloudsql-instances="${CLOUD_SQL_CONNECTION_NAME}" \
            --vpc-connector="${VPC_CONNECTOR}" \
            --vpc-egress=private-ranges-only \
            --command=alembic \
            --args=-c,app/db/migrations/alembic.ini,upgrade,head \
            --set-env-vars="APP_ENV=production,CLOUD_SQL_CONNECTION_NAME=${CLOUD_SQL_CONNECTION_NAME},DATABASE_USER=postgres,DATABASE_NAME=dachjob,REDIS_URL=${REDIS_URL},REDIS_ENABLED=${REDIS_ENABLED},S3_ENDPOINT_URL=https://storage.googleapis.com,S3_BUCKET_NAME=${GCS_BUCKET},GOOGLE_CLOUD_PROJECT=${PROJECT_ID},LLM_PROVIDER=deepseek" \
            --update-secrets="DATABASE_PASSWORD=dachjob-dev-db-password:latest,JWT_SECRET=dachjob-dev-jwt-secret-key:latest,SECRET_KEY=dachjob-dev-jwt-secret-key:latest,OPENROUTER_API_KEY=dachjob-dev-openrouter-api-key:latest,DEEPSEEK_API_KEY=dachjob-dev-deepseek-api-key:latest"

      - name: Run migration job
        if: ${{ (needs.prepare.outputs.cloud == 'gcp' || needs.prepare.outputs.cloud == 'all') && needs.prepare.outputs.run_migrations == 'true' }}
        run: |
          gcloud run jobs execute "${MIGRATION_JOB_NAME}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --wait

      - name: Run Azure migrations
        if: ${{ (needs.prepare.outputs.cloud == 'azure' || needs.prepare.outputs.cloud == 'all') && needs.prepare.outputs.run_migrations == 'true' }}
        run: |
          bash infra/deploy/scripts/deploy-azure.sh "migrations" \
            "${{ needs.build-api.outputs.image }}" "" "" "" "true"

      - name: Capture service URL
        id: url
        run: |
          if [[ "${{ needs.prepare.outputs.cloud }}" == "gcp" ]]; then
            url="$(gcloud run services describe "${API_SERVICE_NAME}" --project="${PROJECT_ID}" --region="${REGION}" --format='value(status.url)')"
          else
            url="${{ env.API_BASE_URL }}"
          fi
          echo "url=${url}" >> "${GITHUB_OUTPUT}"

      - name: Health check API
        run: |
          for attempt in {1..30}; do
            if curl -fsS "${{ steps.url.outputs.url }}/api/health"; then
              exit 0
            fi
            sleep 5
          done
          exit 1

  deploy-frontend:
    name: Deploy frontend (${{ needs.prepare.outputs.cloud }})
    needs:
      - prepare
      - terraform
      - build-frontend
    if: ${{ always() && needs.prepare.outputs.deploy_frontend == 'true' && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') && needs.build-frontend.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      url: ${{ steps.url.outputs.url }}
    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.branch }}

      - name: Authenticate to Google Cloud
        if: ${{ needs.prepare.outputs.cloud == 'gcp' || needs.prepare.outputs.cloud == 'all' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Setup gcloud (GCP)
        if: ${{ needs.prepare.outputs.cloud == 'gcp' || needs.prepare.outputs.cloud == 'all' }}
        uses: google-github-actions/setup-gcloud@v3

      - name: Authenticate to Azure
        if: ${{ needs.prepare.outputs.cloud == 'azure' || needs.prepare.outputs.cloud == 'all' }}
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy frontend (GCP)
        if: ${{ needs.prepare.outputs.cloud == 'gcp' || needs.prepare.outputs.cloud == 'all' }}
        run: |
          gcloud run deploy "${FRONTEND_SERVICE_NAME}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${{ needs.build-frontend.outputs.image }}" \
            --service-account="${FRONTEND_SERVICE_ACCOUNT}" \
            --port=3000 \
            --allow-unauthenticated \
            --set-env-vars="NODE_ENV=production,NEXT_PUBLIC_API_BASE_URL=${API_BASE_URL},INTERNAL_API_BASE_URL=${API_BASE_URL}"

      - name: Deploy frontend (Azure)
        if: ${{ needs.prepare.outputs.cloud == 'azure' || needs.prepare.outputs.cloud == 'all' }}
        run: |
          bash infra/deploy/scripts/deploy-azure.sh "frontend" \
            "" "${{ needs.build-frontend.outputs.image }}" "" "" ""

      - name: Capture service URL
        id: url
        run: |
          if [[ "${{ needs.prepare.outputs.cloud }}" == "gcp" ]]; then
            url="$(gcloud run services describe "${FRONTEND_SERVICE_NAME}" --project="${PROJECT_ID}" --region="${REGION}" --format='value(status.url)')"
          else
            url="${{ env.FRONTEND_URL }}"
          fi
          echo "url=${url}" >> "${GITHUB_OUTPUT}"

      - name: Health check frontend
        run: |
          for attempt in {1..30}; do
            if curl -fsS "${{ steps.url.outputs.url }}" >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          exit 1

  scale-down-worker:
    name: Scale down worker to zero
    needs:
      - prepare
      - terraform
      - deploy-api
    if: ${{ always() && needs.prepare.outputs.worker_enabled == 'disabled' && needs.prepare.outputs.scale_down_worker == 'true' && needs.prepare.outputs.deploy_worker != 'true' && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Scale down worker deployment
        run: |
          kubectl delete hpa celery-worker --namespace="${GKE_NAMESPACE}" --ignore-not-found
          kubectl scale deployment/celery-worker --namespace="${GKE_NAMESPACE}" --replicas=0
          kubectl get deploy,hpa,pods --namespace="${GKE_NAMESPACE}" -o wide

  deploy-worker:
    name: Deploy worker (${{ needs.prepare.outputs.cloud }})
    needs:
      - prepare
      - terraform
      - build-worker
    if: ${{ always() && needs.prepare.outputs.deploy_worker == 'true' && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') && needs.build-worker.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.branch }}

      - name: Authenticate to Google Cloud
        if: ${{ needs.prepare.outputs.cloud == 'gcp' || needs.prepare.outputs.cloud == 'all' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Setup gcloud (GCP)
        if: ${{ needs.prepare.outputs.cloud == 'gcp' || needs.prepare.outputs.cloud == 'all' }}
        uses: google-github-actions/setup-gcloud@v3

      - name: Authenticate to Azure
        if: ${{ needs.prepare.outputs.cloud == 'azure' || needs.prepare.outputs.cloud == 'all' }}
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy worker (GCP)
        if: ${{ needs.prepare.outputs.cloud == 'gcp' || needs.prepare.outputs.cloud == 'all' }}
        run: |
          gcloud iam service-accounts add-iam-policy-binding "${WORKER_SERVICE_ACCOUNT}" \
            --project="${PROJECT_ID}" \
            --role="roles/iam.workloadIdentityUser" \
            --member="serviceAccount:${PROJECT_ID}.svc.id.goog[${GKE_NAMESPACE}/worker]" >/dev/null

          set +x
          database_password="$(gcloud secrets versions access latest --secret=dachjob-dev-db-password --project="${PROJECT_ID}")"
          jwt_secret_key="$(gcloud secrets versions access latest --secret=dachjob-dev-jwt-secret-key --project="${PROJECT_ID}")"
          gemini_api_key="$(gcloud secrets versions access latest --secret=dachjob-dev-gemini-api-key --project="${PROJECT_ID}" 2>/dev/null || true)"
          database_url="postgresql+psycopg://postgres:${database_password}@localhost/dachjob?host=/cloudsql/${CLOUD_SQL_CONNECTION_NAME}"

          kubectl create namespace "${GKE_NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic worker-secrets \
            --namespace="${GKE_NAMESPACE}" \
            --from-literal=database_password="${database_password}" \
            --from-literal=database_url="${database_url}" \
            --from-literal=jwt_secret_key="${jwt_secret_key}" \
            --from-literal=gemini_api_key="${gemini_api_key}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl apply -f infra/k8s/celery-worker/deployment.yaml
          kubectl set image deployment/celery-worker \
            worker="${{ needs.build-worker.outputs.image }}" \
            --namespace="${GKE_NAMESPACE}"
          kubectl rollout status deployment/celery-worker --namespace="${GKE_NAMESPACE}" --timeout=300s
          kubectl get pods --namespace="${GKE_NAMESPACE}" -o wide

      - name: Deploy worker (Azure)
        if: ${{ needs.prepare.outputs.cloud == 'azure' || needs.prepare.outputs.cloud == 'all' }}
        run: |
          bash infra/deploy/scripts/deploy-azure.sh "worker" \
            "" "" "${{ needs.build-worker.outputs.image }}" "" ""

  summary:
    name: Deployment summary
    needs:
      - prepare
      - terraform
      - deploy-api
      - deploy-frontend
      - deploy-worker
      - scale-down-worker
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Write summary
        run: |
          echo "## Deployment Summary" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Item | Value |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| --- | --- |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Cloud | ${{ needs.prepare.outputs.cloud || 'gcp' }} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Environment | ${{ needs.prepare.outputs.environment || 'dev' }} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Branch | ${{ needs.prepare.outputs.branch }} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Target | ${{ needs.prepare.outputs.target }} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Image tag | ${{ needs.prepare.outputs.image_tag }} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Terraform | ${{ needs.terraform.result }} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| API | ${{ needs.deploy-api.result }} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Frontend | ${{ needs.deploy-frontend.result }} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Worker | ${{ needs.deploy-worker.result || needs.scale-down-worker.result || 'skipped' }} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| API URL | ${{ needs.deploy-api.outputs.url || env.API_BASE_URL }} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Frontend URL | ${{ needs.deploy-frontend.outputs.url || env.FRONTEND_URL }} |" >> "${GITHUB_STEP_SUMMARY}"
