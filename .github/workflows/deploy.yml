name: Deploy to GCP

on:
  push:
    branches:
      - main
      - deploy/*
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'
      target:
        description: 'Deployment target(s)'
        required: true
        type: choice
        default: 'all'
        options:
          - all
          - api
          - frontend
          - worker
          - terraform
      terraform_apply:
        description: 'Run terraform apply (will prompt for approval)'
        required: false
        type: boolean
        default: false

env:
  PROJECT_ID: dachjob-ai-platform
  REGION: europe-west1
  GAR_LOCATION: europe-west1
  API_SERVICE_NAME: dachjob-dev-api
  FRONTEND_SERVICE_NAME: dachjob-dev-frontend
  GKE_CLUSTER_NAME: dachjob-dev-cluster
  WORKLOAD_IDENTITY_PROVIDER: projects/936971254595/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider

jobs:
  # ─────────────────────────────────
  #  1. Setup & Auth
  # ─────────────────────────────────
  auth:
    name: Authenticate to GCP
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      gar_repos: ${{ steps.set-repos.outputs.gar_repos }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: dachjob-dev-terraform-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set repository paths
        id: set-repos
        run: |
          echo "gar_repos=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}" >> $GITHUB_OUTPUT

  # ─────────────────────────────────
  #  2. Build & Push Images
  # ─────────────────────────────────
  build-api:
    name: Build API image
    needs: auth
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'api' || github.event.inputs.target == '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Set image tag
        id: tag
        run: echo "tag=${{ github.sha }}-$(date +%s)" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: app/backend/Dockerfile
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dachjob-dev-api:${{ steps.tag.outputs.tag }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dachjob-dev-api:latest

      - name: Output image tag
        run: echo "API_IMAGE_TAG=${{ steps.tag.outputs.tag }}" >> $GITHUB_OUTPUT

  build-frontend:
    name: Build Frontend image
    needs: auth
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'frontend' || github.event.inputs.target == '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Set image tag
        id: tag
        run: echo "tag=${{ github.sha }}-$(date +%s)" >> $GITHUB_OUTPUT

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: app/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dachjob-dev-frontend:${{ steps.tag.outputs.tag }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dachjob-dev-frontend:latest

  build-worker:
    name: Build Worker image
    needs: auth
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'worker' || github.event.inputs.target == '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Set image tag
        id: tag
        run: echo "tag=${{ github.sha }}-$(date +%s)" >> $GITHUB_OUTPUT

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: app/backend/Dockerfile
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dachjob-dev-worker:${{ steps.tag.outputs.tag }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dachjob-dev-worker:latest

  # ─────────────────────────────────
  #  3. Deploy to Cloud Run
  # ─────────────────────────────────
  deploy-api:
    name: Deploy API to Cloud Run
    needs: [build-api, auth]
    runs-on: ubuntu-latest
    if: ${{ always() && needs.build-api.result == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: dachjob-dev-terraform-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Deploy API to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.API_SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dachjob-dev-api:latest

  deploy-frontend:
    name: Deploy Frontend to Cloud Run
    needs: [build-frontend, auth]
    runs-on: ubuntu-latest
    if: ${{ always() && needs.build-frontend.result == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: dachjob-dev-terraform-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Deploy Frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.FRONTEND_SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dachjob-dev-frontend:latest

  # ─────────────────────────────────
  #  4. Deploy to GKE (Celery Worker)
  # ─────────────────────────────────
  deploy-worker:
    name: Deploy Worker to GKE
    needs: [build-worker, auth]
    runs-on: ubuntu-latest
    if: ${{ always() && needs.build-worker.result == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: dachjob-dev-terraform-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.REGION }}

      - name: Deploy Worker to GKE
        run: |
          kubectl set image deployment/celery-worker worker=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dachjob-dev-worker:latest \
            --namespace=celery-worker \
            --record

  # ─────────────────────────────────
  #  5. Terraform (infrastructure)
  # ─────────────────────────────────
  terraform:
    name: Terraform Apply
    needs: auth
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.terraform_apply == 'true' || (github.event.inputs.target == 'terraform') }}
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: dachjob-dev-terraform-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=dachjob-dev-terraform-state" \
            -backend-config="prefix=dev"

      - name: Terraform Plan
        id: plan
        run: terraform plan -var-file=environments/dev/terraform.tfvars -out=tfplan

      - name: Terraform Apply
        run: terraform apply tfplan

  # ─────────────────────────────────
  #  6. Summary
  # ─────────────────────────────────
  summary:
    name: Deployment Summary
    needs: [deploy-api, deploy-frontend, deploy-worker]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Print deployment URLs
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **API** | ${{ needs.deploy-api.result == 'success' && '✅ Deployed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Frontend** | ${{ needs.deploy-frontend.result == 'success' && '✅ Deployed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Worker** | ${{ needs.deploy-worker.result == 'success' && '✅ Deployed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Branch: ${{ github.event.inputs.branch || github.ref_name }}" >> $GITHUB_STEP_SUMMARY
