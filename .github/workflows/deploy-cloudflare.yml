name: Deploy to Cloudflare
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      component:
        description: "Component to deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - api
          - pipeline-importer
          - frontend
          - migrate

env:
  NODE_VERSION: "22"

jobs:
  deploy-api:
    if: >
      github.event_name == 'push' ||
      github.event.inputs.component == 'all' ||
      github.event.inputs.component == 'api'
    runs-on: ubuntu-latest
    name: Deploy Worker API
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: infra/cloudflare/worker-api/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: infra/cloudflare/worker-api

      - name: Type check
        run: npx tsc --noEmit
        working-directory: infra/cloudflare/worker-api

      - name: Deploy Worker
        run: npx wrangler deploy
        working-directory: infra/cloudflare/worker-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-frontend:
    if: >
      github.event_name == 'push' ||
      github.event.inputs.component == 'all' ||
      github.event.inputs.component == 'frontend'
    runs-on: ubuntu-latest
    name: Deploy Pages Frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app/frontend

      - name: Build static export
        run: npm run build
        working-directory: app/frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL || 'https://dachjob-api.yaoyaoyaoyao.workers.dev' }}

      - name: Deploy to Pages
        run: npm exec -- wrangler pages deploy out --project-name=dachjob-web
        working-directory: app/frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-pipeline-importer:
    if: >
      github.event_name == 'push' ||
      github.event.inputs.component == 'all' ||
      github.event.inputs.component == 'pipeline-importer'
    runs-on: ubuntu-latest
    name: Deploy Pipeline Importer Worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: infra/cloudflare/pipeline-importer-worker/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: infra/cloudflare/pipeline-importer-worker

      - name: Type check
        run: npx tsc --noEmit
        working-directory: infra/cloudflare/pipeline-importer-worker

      - name: Deploy Worker
        run: npx wrangler deploy
        working-directory: infra/cloudflare/pipeline-importer-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  migrate-db:
    if: >
      github.event.inputs.component == 'migrate' ||
      github.event.inputs.component == 'all'
    runs-on: ubuntu-latest
    name: Run D1 Migrations
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Run migrations
        run: |
          wrangler d1 execute dachjob-db --remote --file=infra/cloudflare/migrations/0001_initial.sql
          wrangler d1 execute dachjob-db --remote --file=infra/cloudflare/migrations/0002_add_notes_to_applications.sql
          wrangler d1 execute dachjob-db --remote --file=infra/cloudflare/migrations/0003_job_pipeline_metadata.sql
          wrangler d1 execute dachjob-db --remote --file=infra/cloudflare/migrations/0004_job_countries.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
